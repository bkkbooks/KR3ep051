body:
  text: 正文鄙人每有作品隨手抒寫從不起草非矜腹稿也蓋診務告蕆往往彌夜篝燈速記無暇及此也後序乃十四年前所撰老之將至精力日衰以今視昔覺向所視為草率者尚屬整齊可觀原敘嘉善稱善醫者必推俞東扶沈堯封二先生今已百餘年矣東扶諱震今寓郡城行醫號鵠門名灝其曾孫也其孫號磻溪乃余堂弟賓之外祖賓常從外祖習醫詢其遺書惟存刻本古今醫案其書乃取之名醫類案而間附己説者其餘悉為五房取去無可問者今夏友人徐君錫文以百錢易二册示余標云俞東扶夫子醫案嘉樂手抄云據云即沈鶴山弟號宗海未知是否急録時疾一卷徐君攜去至冬徐君來亟補録其全寒風懍烈十指皆僵矣堯封諱又彭有刻本醫經讀傷寒論讀行世其嗣孫號惠曾者詢其遺書云悉為其侄復山名圻賣去板亦無存以抄本醫案質之而彼已老病茫然矣此文據徐君錫文云自孫先生處借來亦不明言孫先生為何許人抄本破碎二册亦無標題印識乃費十日工亟録一通匯訂為四册名曰昔賢醫案以其無可考據故也隆冬冰雪中抄胥亦復不易我子孫其勿輕貸人可爾道光三十年十二月初八日怡云王文書於沈氏之泰南別墅一中風類中與陰陽虛參看俞案案向來精神健旺習於操勞家事素無所苦惟左足大指時常發麻近連右足大指亦或發麻考之丹溪東垣諸論謂麻屬氣虛而足大指乃肝脾二經發源之地今麻已一年且漸延至足脛是肝脾二經氣衰而血亦耗恐有風痱之患內經云肝藏血脾統血血虛則火易旺故齒痛兼生牙癰血因痛而愈耗遂有心悸不寐等症近來聞響動心即驚跳或遇惱怒徹夜無寐若使此夜不眠明日諸疴競作蓋不寐則陽不入於陰陰愈衰而陽愈亢種種不安矣麻發之時自覺頭目虛眩此血不養肝肝風內舞治法必以養血滋肝為主而血從氣生須兼培補元氣之藥緩調以圖漸痊診脈左手細澀右寸大右尺不應先用寧神補心湯加減生地麥冬丹皮棗仁茯神杜仲甘菊小草石斛燈心三分十帖後去燈芯加參鬚案頭眩體倦右邊手足痠麻是氣血不能充灌將有偏枯之患納穀有脹尤屬脾虛確據些微之參豈能補益依方制合為妥人參另入研加五錢百蒸於術土炒二兩雲苓一兩五錢苡仁二兩歸身二兩杜仲二兩制首烏炒三兩白芍一兩五錢焦鍋巴炒二兩新會皮一兩案谷納漸減步履如蹈空此下焦衰乏恐成類中之病診脈左大右軟宜補心脾黃耆於術洋參根生地麥冬茯神白芍穭豆皮杜仲大棗案失血亦不過多而左手麻木午後神昏視其氣象殊非憔悴羸瘦者比則昏麻二症乃內有積痰肝風鼓動上蒙清竅將來痱中之機也脈濁右手如促如動往來之間如有阻滯痰血鬱於隧道耳宜補氣血以疏通之使其漸輕可也其病更有納減便溏人參雲苓於術半夏歸身鉤鉤橘紅甘草阿膠加真琥珀鎊屑杵極細二分竹瀝十匙同沖服案中指屬陽明胃經痛強麻木不能屈伸此陽明虛而氣不到防其腫痱延成重症雲苓虎膝骨牡蠣生地歸身白芍秦艽苡仁石斛桑枝又手中指屬陽明陽明虛故屈伸不便計維歸脾湯兼針灸以通經絡方可獲效歸脾湯去木香加杜仲案頭眩左肩臂麻而無力是中風之兆脈細宜補以散之黃耆白朮黨參歸身秦艽桂枝半夏甘草海風藤案此類中風也左手足不用舌音不清乃邪在經絡宜大秦艽湯約三四十歲秦艽桂枝羌活半夏歸身橘紅茯苓杜仲鉤藤炙草桑葉案當風淋浴以致口眼喎斜雖用藥得痊而病根三載未除近加吐痰肋時痛以風邪散入手足太陽陽明之經脈象左弦右滑宜大追風散加減川烏漂七日夜去皮切片曬乾生用五錢生黑豆去皮二兩全蠍酒洗去毒三錢北細辛炒一錢熟半夏一兩五錢熟石膏二兩白芷八錢黃芩一兩五錢生甘草四錢白附子炒四錢為末用老薑一兩陳茶葉一兩煎湯泛丸每夜服二錢二風沈案案嵇陽虛風痹周身遊走而痛用小續命湯防風荊芥人參防己白芍川芎麻黃熟附杏仁黃芩案徐二十脈右大脘中爽口渴腸風知母竹葉心銀花花粉生地緑豆皮案凌五五木火形體善動少靜操持拂鬱頻多陽虛失衛怕風畏寒氣塞不行脈絡痹痛議補益陽氣疏通經絡勿令其痹當歸桂枝枸杞菊花蒺藜蔓荊子案周草二夫風上蒙清空勞倦傷陽郁在上焦陽分與辛涼解鬱方連翹山梔鬱金黃芩赤芍生甘草菊花花粉案王據説鼻塞若用力屏氣速耳竅失聰左脅骨高突氣辛開泄暫用不得除根驗脈是經絡氣分之阻當以輕清為治枇杷葉薄荷杏仁瓜蔞蘇子橘紅桔梗降香生薑臥時服茶調散案華體虛復受風濕熱勝精傷陽直降為遺泄胃未和脘猶痹暫用甘涼和胃生津大麥仁麥冬蔗漿竹葉心扁豆俞東扶先生醫案原本嘉樂手抄印曰嘉樂之印康戌六月十三徐君錫文得此攜來怡云於蚊市中録三時證俞案案內經云耳者宗脈之所附又云身中精陽之氣上走於目而為之晴其彆氣走於耳而聽此時目無神采耳聽不聰由邪混三焦出入靡常忽輕忽重反復變遷所致脈象左手浮右手雖略小而重按有力知非陰症與虛寒其躁擾不寧乃濕痰挾伏邪膠黏難達則宗氣彆氣隔塞不通耳仲景梔豉湯乃宣達陽明伏邪之藥故以湧吐為法用之而得效者邪亦稍得舒泄也此方甚善但邪不僅在陽明未必遽能霍然茲仿達原飲之意略為變通冀其煩悶漸鬆自當漸入佳境天蟲土貝瓜蔞皮茯苓皮草果殼青蒿梗錢半浮海石甘草人中黃地漿水煎服案夏日曾患痢疾又於酒醉後僕水此暑濕之邪蘊結已久中秋加以感冒遂寒熱如瘧咳嗽吐痰熱久不退身面發黃是外邪合身內濕熱釀所致向來體豐好飲伏痰必多此番縱啖生冷痰與邪俱鬱閉不通故昏沉躁擾神氣矇混有如厥中之狀消痰滾痰二便漸通心神稍清但舌本淡白舌苔白厚口仍作渴四肢微冷中脘痞硬面黃帶浮尚屬濕痰伏熱未清脈象沉弦亦由邪陷未可遽視為坦途也治法當以利濕消痰為主而兼透達伏邪之藥使表裡宣通清濁分疏乃無反復耳赤茯苓熟半夏江枳殼六一散茵陳黃芩天蟲連翹加鮮石菖蒲根一錢搗入接方清晨診候左脈弦大有力右脈細軟無神此伏痰與邪膠黏不散占據清陽之地所以胸口板硬即傷寒論中所謂結胸也痰與邪既相結聚正氣不能流通故右脈不能充沛而神色如昏如清舌苔如灰如白病情尚在出入之間必得胸中寬鬆面色紅活乃無反復天蟲法半夏羚羊角尖木通蔞皮橘紅連翹茵陳加石菖蒲汁三匙衝入案舌紅而干口渴為陽明熱重不宜泄瀉瀉則脾虛而邪陷最為惡候症久不化犯疑之證宜進瀉心湯以圖挽回若瀉止熱緩方可無虞川連五分赤苓木通甘草丹皮銀花炭天蟲連翹案赤斑白疹密布周身口渴發厥躁擾不寧而唇淡舌白此邪毒未透尚防反復右關脈滑體素豐肥乃痰與伏邪合風暑為患宜化斑解毒佐以消痰之品但得午後熱不加重即可漸鬆土貝天蟲石膏鉤鉤人中白甘草青蒿橘紅銀花加竹瀝半小杯鮮石菖蒲根汁三匙接方夏枯草白薇膽星木通花粉麥冬天蟲土貝橘紅甘草加蘆根五錢案身熱不退而舌苔極薄唇齒不燥亦不作渴則非陽明實熱之症矣常有噫噯兼帶厄逆之象裡虛邪不能達也略有譫語合之脈右洪數清補兩難養陰和胃為妥此症不治二元生地麥冬沙苑蒺藜茯神川石斛枸杞刀豆子穀芽新會皮磨沖白檀香汁五匙案身熱口渴煩躁舌乾此陽症也脈細乃體質素虛非陽症陰脈之比但虛者不可過於攻擊宜養正清熱為主元生地麥冬丹皮川連知母木通梔甘草案寒熱如瘧中脘痞結脈象左手弦數右關滑大是邪在陽明少陽宜和解之蔞皮知母草果一錢桂枝七分白芍甘草半夏花粉豬苓案午後熱重口乾便赤目黃胸滿多汗脈弦滑少陽症柴胡黃芩半夏秦艽木通茵陳厚朴甘草加薑皮案身熱兩月無汗舌黑齒燥泄瀉危候也脈小而滑姑與河間雙解散赤茯苓厚朴白芍麥冬漂滑石甘草葛根車前子加蘆根二兩案身熱不退神思倦怠左耳漸聾舌白膩滑胸中按之作痛無汗不渴此表邪未解挾中焦痰食為患右脈滑數宜清理陽明乾葛大杏仁天蟲橘紅麥芽枳殼半夏甘草加薑皮案發熱不止中脘痞結硬痛此飲食勞倦所傷而又重感風寒以至正虛邪結危候也歸身白芍法半夏香附柴胡七分神麯赤苓丹皮加蔞皮案少陽邪郁不解內走而入厥陰之絡脅下支結內熱無汗診脈弦細且急宜宣達肝邪歸身白芍香附半夏柴胡五分丹皮木通炙草加荷梗五寸案夏秋時行之病原屬客邪鬱伏汗出已多邪當解散乃自秋徂冬身熱不能盡退近則午後寒熱寒重熱輕宛如瘧狀逮汗出而熱漸減卻仍不淨診其脈象尚帶弦數但左手空軟右關滑大此營陰已虧陽明猶有痰氣阻滯所以胃脘左畔結硬成塊幸不作痛惟按之堅硬仲景少陽篇中所謂心下有支結也此塊不除寒熱不止仲景本用柴胡桂枝幹薑湯今宗是方加減可獲愈桂皮花粉炙草丹皮蔞皮橘紅牡蠣案每夜熱發舌黃口苦脈象左弦右細此營陰虛而少陽之邪未解當歸白芍柴胡香附丹皮甘草杜仲大棗接方根生地丹皮夏枯草香附歸身白芍炙草杜仲大棗案客邪發熱咳嗽鼻衄此秋熱乘金逼胃清之自愈犀角尖生地丹皮麥冬香附木通夏枯草川斛茅根案汗不出至足營衛未和也熱已退而譫語邪留心絡耳左脈猶弦宜清養之根生地麥冬杜仲川斷秦艽穭衣皮女貞子苡仁案寒熱兩次忽暈厥厄逆目珠青嘔水如草汁此厥陰經症肝邪橫發中土立敗乃不治之候勉與椒梅湯以圖僥幸川椒烏梅當歸白芍人參乾薑川連土炒法半夏案齒燥舌乾神昏口渴乃熱邪內陷蒸灼津液而為痰痰迷心竅諸藥不應危候也脈雖細尚帶滑數宜清解之此證不治元生地麥冬石膏知母陳膽星土貝甘草橘紅丹皮加鮮石菖蒲汁三匙痰雖吐出神猶昏憒齒燥舌乾燥而不煩皆至危之候脈右滑數實宜再下之以圖僥幸生錦黃二錢檳榔知母石膏一兩石菖蒲生地丹皮甘草案傷風與痢疾同病已屬重症況熱久不退痢下如蟹黃兼紫血一團邪火內燔胸前痞悶噯嘔不斷咽痛口渴肝葉脹痛病多且深殊屬可畏脈象左手弦細而類數右手滑實而數宜用血藥加苦寒以下之大黃黃連瀉心湯合四物加減生地當歸白芍淡芩甘草制黃磨沖厚朴接方生地白芍丹皮石斛知母銀花甘草枳殼犀角茅根又身熱頗輕痢熱亦減俱為佳象唯喉痛不退痰涎上湧視其喉間兩邊白腐乃喉痹也一人而兼三病所以難愈今幸脈數稍緩脈大稍平重按尚覺有力仍宜養陰清熱化痰解毒可望漸安細生地丹皮連翹土貝銀花天蟲犀角元參甘草人中黃石斛茅根案向來精神不足又兼蠶事勞頓裡虛而受客邪寒熱咳嗽當時即宜避風靜養及以丈田出門復風熱之邪邪乘虛而入病益加重身熱不退舌乾苔黑氣急咳頻飲食不進身上斑點未透耳聾齒亦乾燥是為真陰久衰客邪內陷殊非輕病蓋先曾鼻衄便紅血虛則難作汗此時形瘦舌乾津枯則難退熱由傷而兼外感用藥殊為棘手診脈左手弦大帶數右手大而柔軟本虛標實非提斑清火所能愈惟有滋肝潤肺之法使木不燥則火不亢金漸清則水漸充庶望轉危就安淡豆豉生梔子炒半焦丹皮杏仁夏枯草白薇根生地麥冬連翹甘草加燈心去白薇燈心加土貝茅根以其發頤嗆血也案徹夜看奕已受陰寒之邪又傷於食邪與食結則神昏譫語此亦不足為怪但脈象沉細模糊手足厥冷躁擾不寧舌紅無苔乃夾陰傷寒也病前必犯欲事陰邪必入於陰分所以虛象火象合併而現補之不可清之不應殊為危險計惟以下恐原本本缺以下所接之方亦非也大力子生研天蟲酒炒土貝麥冬炒蔞皮赤芍石菖蒲橘紅覆花蘇梗外用逢頭柳頭桃頭萊蔔子各一兩芫荽蔥白各三錢煎湯揩抹手足胸腹改方陳膽星石菖蒲天蟲橘紅川桂枝炙草薑皮案身不甚熱越旬無汗病起即覺耳鳴漸至聾聵神昏譫妄時顯躁象此由心腎兩虛邪入手足少陰所以舌紅無苔口不燥渴仍能起坐而神思困倦蓋陰虧則液涸裡虛則邪陷診數有六至左弦右軟法宜用張景嶽補陰以蒸其汗蓋腎以交於心略佐清邪化痰之品冀其得汗神氣稍清庶入坦途生地麥冬丹皮元參黑梔橘紅瓜蔞霜茯神淡豆豉數日後下血有如畜血症用犀角地黃湯加白芨童便附病家來札云犀角地黃湯服一劑因病人不肯服藥暫止二日然神色終不清仍有譫妄搐搦之象於原方少加制黃服一劑亦不見病之進退然是夜更加發厥口中糜白如鵝口次日頻進參鬚麥冬湯至下午身有微熱汗次日又服阿膠黃連一劑以後宿瘀漸止神識亦清夜忽起厄逆服竹茹生薑合參麥冬而止以後服養陰清熱三四劑口糜仍不退反見咽乾痛因用甘露飲加黃連一劑停藥三四日口糜已退惟喉內尚有白點耳亦能聽神氣亦得清飲食亦進惟痰尚盛聲猶帶嘶時覺起坐不寧脈象左弦軟帶數右寸數而關尺細軟不大便已六七日矣恐調理失宜再酌一方四時症門沈案案王潤堂太太今夏暑濕熱甚而久暑屬無形吸受其氣必入衛營壅塞不行則為癰瘍肢臂不舉經脈痹阻熱毒無由開泄理必燎灼絡中絡脈麗乎臟腑煩躁腹脹不食不便熱邪充斥三焦彰明較著夫蟾酥梅花點舌丹大辛大熱加以諸香以之攻陰寒沉痼方為對症以之治暑熱致癰反為邪樹幟矣即參耆歸芍只可調氣血於邪盡之後不能解熱毒於方盛之時病機十九條之諸瘡痛癢皆屬心火諸痙鼓栗諸脹腹大皆屬於熱然久熱必從燥化形質暴大盛為消也苦寒化燥未可輕投宗景嶽玉女煎法倘大便久閉局方涼膈可暫用一服案夏三四溫邪作痛上焦氣分內應於肺初起盡月灑淅微寒邪非重著仍能安穀久則溫蒸傷津令人消爍肌肉仿仲景飲食消息之法早服淡豆腐花一杯暇服甘蔗漿蔥白丸每服錢半紅棗湯服二兩案黃十五少陰陰虧復吸冬溫之氣外感而兼內傷忌辛溫發散勿令根本再傷此甘寒平劑為穩花粉杏仁生甘草沙參桑葉五發熱俞案案身熱無定期胸悶咳嗽舌絳無苔是肝腎不足陰為陽爍也宜滋養之元生地丹皮麥冬白薇夏枯草橘紅甘草穭豆皮北沙參案身熱二十餘日用麥藥不應此受表邪而不避風邪伏營陰所致宜景嶽補陰益氣煎熟地歸身炙草橘紅杜仲秦艽淡豆豉麥冬乾荷葉炒三錢案惡寒發熱咳嗽盜汗右脈無神姑與建中湯川桂枝去皮生白芍炙草加大棗飴糖案自八月至今已六十餘日其間寒熱參差反復而熱退之後仍不能進食口苦無味唇燥舌苔此餘邪未清也近來又發寒熱一次寒時小便澀痛熱時精漏不固是元氣大虛脾腎兩衰皆因從前白濁已久精關所以頻滑耳診脈左手弦急右手細軟亦為正氣虧乏邪氣留連之候治宜先清理接用補養案左尺斜出脘側是為陽維脈內經為陽維為病苦寒熱今舌不退而嘔厄臭水此難治之候姑與鎮降法生地天冬紫菀冬瓜子龜板活磁石牛膝橘紅胡桃肉案日行百里筋骨兩傷致有寒熱其傷內應肝腎自是略有行走寒熱即發蓋所傷不能遽復也歸身白芍制冬朮香附丹皮苡仁新會皮杜仲益母草加桃葉七片案上年下痢今春寒熱又無定期舌苔半邊藍半邊紅此氣血兩傷也咳嗽盜汗昨又咯血脈左弦細右寸軟宜仿雙解飲子法元生地丹皮青蒿青耆甘草杏仁花粉穭豆皮上諸藥一半炒用一半生用一半河水一半天泉水煎服案寒熱之候忽變口眼喎斜此風入陽明之絡宜以血藥祛風生地歸身白芍川芎秦艽鉤鉤荊芥天蟲桂枝黃芩甘草案身熱嘔吐泄瀉兼發風餅脈弦帶數暑風襲於陽明也赤芩廣霍荊芥丹皮連翹豨蘞草酒炒三錢赤芍木通案身常寒熱汗出如舊飲食如常夏月痊安春秋反發此外寒束其內熱也脈細右手帶滑宜古方地骨皮散四物加地骨皮丹皮案病後微有寒熱盜汗乾咳脅脹溺赤脈帶弦肝陽上擾也淡豆豉炒熟丹皮地骨皮麥冬杏仁大香附夏枯草白芍橘紅浮小麥案仲夏瘧疾近復發熱心忡耳鳴不食左脈細澀難尋此氣血兩衰高年之重症也生地苡仁茯神麥冬丹皮杜仲小草橘紅北沙參案向有咳嗽內熱乃陰虛體質所以形瘦食少已具怯症情形七月前忽發寒熱過十日外竟不止其熱左邊尤甚夜間則周身壯熱舌乾耳聾又加泄瀉脈左手弦細而數右手細軟此以虛損之本病而兼外感之客邪殊非輕候蓋前月餘夜不能寐身中酸楚安乃血虛火擾致起寒熱病中復感微風熱遂不退熱甚則乾渴引飲脾弱不能分滲而泄瀉今若清理客邪則真陰愈涸熱仍不去也若滋養真陰則滑潤大腸瀉必更增矣病勢之重在乎此就脈論治當扶正以托邪庶使元氣不陷則伏邪自透方可向安參鬚生地白芍柴胡川連丹皮赤芩炙草六熱病沈案案汪五八氣熱上熾秋令失降體本下虛近因燥氣主令暫清其上酒客病苦辛為宜黑梔象貝杏仁米仁桑葉大沙參案張草一毒鬱氣血之中營衛二氣遇邪痹熱考廣毒門忌用血藥滋膩分消滲利為治萆薢土茯苓銀花通草地丁地膚案黃草二熱傷元氣務在調中天令清肅健旺非難焦術荷葉邊丹皮茯苓新會皮冬桑皮案華三十氣熱甚則化燥用喻嘉言氣燥治肺之法得上和再議下病杏仁葳蕤花粉川貝沙參案黃四三暑邪從上竅而入上焦氣分郁耳目胸次痹塞不飢不納不便熱病須分三焦經言從上病者當治其上杏仁石膏連翹川貝白豆蔻大竹葉復診熱久氣阻辛涼治上頗效陽明絡行身之前宜清膈主治連翹石膏生甘草川貝杏仁竹葉復診玉女煎如花粉復診涼膈散去硝復診伏暑未盡晡熱口渴瀉後腹中微痛竹葉白虎湯加麥冬案顧二十舌起黃胎煩熱口渴伏暑未清蔬食旬日不致變症竹葉石膏湯案計草七體質陰虛當夏秋暑熱內侵客於膜原致寒熱不欲納穀診得陽明脈大用養陰清暑方玉女煎加竹葉案王五七豐腴體質適值過勞陽氣受傷嘔吐食物身熱而無頭痛已非外感風寒間日煩躁渴飲唇焦舌黑是內伏熱氣由膜原以流布三焦亦如瘧邪分爭營衛者然然積勞既久伏邪客病脈來小緩按之不數可為徵驗且二便頗通略能納穀焉有停聚滯積仲景於痹熱無寒之條不出方藥但曰以飲食消息後賢參入聖旨以甘寒滋養胃陰其熱自解要知表散之辛與苦溫苦寒沉降消滯俱犯聖戒矣竹葉心麥冬生地蔗漿杏仁花粉連翹七惡寒俞案案秋冬背常惡寒身雖熱而寒不退盜汗舌黃溺赤此內有熱外有寒宜和衛氣桂枝白芍花粉青蒿炙草半夏加薑棗案病後咳嗽背惡寒而脈弦數舌苔微黃此表寒熱之候法宜清解淡豆豉秦艽丹皮杏仁薄荷橘紅玉竹甘草案背寒為肺虛亦即衛陽虛也乃脈不軟而弦細帶數丹溪所謂惡寒非寒是火鬱故耳右脈獨弱下焦根柢衰矣衛出於下焦藩籬既撤汗多寒甚所由來也陰必生陽陽必乘陰寧無寒熱之虞乎救陰固陽庶免陽越陰枯之患嫩黃耆參條麥冬川石斛女貞子冬桑葉根生地穭豆皮牡蠣浮小麥案惡寒而嘔痰火在陽明熱極生寒也葛根漂滑石法半夏麥冬橘紅甘草白豆蔻嫩蘆根二兩案右脈尚大而惡寒仍屬火鬱宜用桂苓甘露飲桂枝雲苓甘草法半夏滑石橘紅麥冬白豆蔻寒水石研三錢老薑皮案病後畏風精神疲倦右手氣口脈大於入迎正合東垣補中益氣湯症原方加杜仲八陰虛陽虛俞案案腎主骨周身骨節痠痛腎虛也腰腿痠痛陰虧也咳嗽乃火來刑金食少乃脾衰不運也後為少陽部分木火上翔後結核是皆童弱病情先天不足所致熟地雲苓山藥丹皮麥冬杜仲北沙參牡蠣案咳嗽則頭巔作痛連於腦後此下焦龍火因督脈而上金受火刑不能生水故目光昏花骨節痠痛法當潛納虛陽生地天冬甘菊杜仲枸杞歸身牡蠣女貞子淮牛膝淡菜案足少陰脈循喉入肺足厥陰之支脈貫膈注肺凡人腎氣充足者聲音高爽腎氣虧損聲音低颯不獨金實不鳴金破不鳴二義也尊恙於煩勞之後半夜忽然聲喑清理漸愈越數日喑又如前知非外感為病矣勞心過度心腎不交水下心上金受其刑又加惱怒肝陽直射肺中而腎脈不上循於喉嚨火位之下無水承之內經為內奪而厥則為喑痱此其類也今足冷麵熱腳膝無力夜不能寐口乾咽燥全是下焦衰乏陰精不主上涵治肺無益法宜補腎右脈衰於左脈六脈俱帶微數陽藥難投定當以壯水固金為主生地丹皮山藥雲苓麥冬桑葉穭豆衣北沙參加竹衣二分案腎開竅於二陰其脈上循喉嚨或便結或咽痛或精滑皆腎陰不足相火內擾所致六味丸去澤瀉加二冬元參沙參女貞子蜜丸案咽喉黏膩咳咯不清面常火升身復惡寒此陰虧不能涵納真陽龍相上騰所致據述尚有淋帶可知下焦大虛宜鹹味填陰介屬潛陽熟地天冬牡蠣鹽水煮枸杞杜仲沙苑夕利炒研女貞子海螵蛸童便浸炙三次三錢加大貢採去毛洗淡一兩案水不涵木木復生火刑金則清肅之令不行面手漸腫凌脾則運化之臟失司谷納日減每交丙夜氣升煩熱更兼癸汛頻來甚少此景嶽所謂子午不交陰竭陽孤至危至險之候也脈細而數清補俱難收效姑用潛陽鎮肝方以圖僥幸虎膝骨龜板生地淮牛膝生白芍川柏苡仁牡蠣棗仁浮小麥接方火升未降自覺內熱原作蟄心即欲嘔吐酸水兼之目赤唇紅左乳縮小總屬肝陽亢極火盛而水不能濟病情變幻愈多矣大便溏泄經頻帶下木火交煽脾傷腎涸犯及奇經也左脈弦數依前法加直折肝火之品歸身白芍川連酒炒七分鉤鉤半夏香附牡蠣白朮雲苓案衝任二脈與腎脈同起於下焦腎虛則衝脈上衝丹溪所謂火起於九泉之下也腎熱故玉關不閉精常漏泄虛陽上越不肯潛降所以面紅舌糜兩足冰冷腎脈循咽絡肺腎中真陰耗竭其真陽無所依附隨脈而逆行則咽燥肺焦故聲音不能朗亮此皆本原重症內經云一水不能制五火又云諸逆衝上皆屬於火斯症是矣頭眩者腎火亢而肝火亦動也治火之法首辨虛實此係虛火斷非旦夕所能平脈象弦徑且大幸不快數須以甘寒之藥滋養收攝尤當耐性寧心以靜鎮之使五志之火不生則真水漸可積蓄而諸疴徐退矣水制熟地牡蠣鹽水煮五錢天冬龜板童便浸炙三錢麥冬金櫻子六錢桑螵蛸以桑枝三錢煎湯浸炙一錢五分洋參二錢北五味去核用肉五分活磁石三錢五六帖後去洋參易參鬚八分案此是少陰咽痛蓋腎脈絡肺腎水虧而坎中之火直犯肺金肺熱葉焦膿血交出腎脈上循喉嚨火亦上升不降乃為咽痛致險之候也脈軟而數滋清無益勉與仲景豬膚湯以圖僥幸豬膚二兩切片水二煎至一碗去楂入白蜜一小杯再煎至一碗不時服紫雪亦可間用案舊曾失血近則咽痛水不制火柔金受也據述咳嗽嘔冷水法宜金水六君煎去歸以避辛熟地苓半夏桑葉橘紅麥冬甘草乾荷葉案久虛之體咽痛不痊乃陰竭而陽無所附殊非輕候氣衝噯嘔囟門痛若動狀皆厥陰上冒之象陽升不潛則下焦虛寒故穀食難化腹痛鳴瀉此病勢日深光景計維仍用本元治法冀受補為吉熟地冬米炒雲苓山藥參鬚石斛橘紅桑葉穭豆皮苡仁案陰虛咳嗽金不生水腎藏日衰足痿腰痛此為損症五損損於骨越人原為不治之候蒂丁下墜真陰傷極姑與滋養以望轉關生地麥冬北沙參丹皮桑葉扁豆女貞子石斛杜仲又陰虛之病腳軟者不治以足三陰之脈起於足足痿且麻三陰脈絶也聲喑咽痛者不治以金為火爍清降失司也蒂丁下墜者不治以元氣耗敗脾腎兩衰也今兼諸症藥何能為照前方去生地扁豆杜仲易參鬚苡仁棗仁浮小麥案虛證勢難愈而脾腎兩虛尤難兼顧蓋補脾藥多溫燥補腎藥須涼潤也今脈數象稍和右寸仍然數大水虧則肺熱肺熱則痿尚當以補腎為主生地苡仁枸杞石斛天冬扁豆歸身蓮肉橘紅杜仲案水不制火金受火刑身熱咳嗆已成損症若納穀不減猶可圖維今食少痰多肌肉盡化為痰土又敗矣咳痰自覺腥臭濃厚如肉壞此為肺痿非肺癰肺痿則諸藏無所稟承枯稿難支勢殊危篤姑再用養陰保肺之法以圖僥幸於萬一生地麥冬地骨皮桑葉北沙參丹皮橘紅白花百合苡仁蘆根案洞泄為脾衰不能分滲食減瀉頻腹鳴作脹土將敗矣此猶可補可溫惟陽痿聲喑腎藏已竭法在不治春令木升而水不能供何藥能效金匱腎氣丸案左脈細軟無神心腎兩虛頭眩體麻腹痛如欲瀉狀是虛陽上擾下焦不能吸納耳用陰藥則礙脾且仿潛陽法以變通之虎膝骨牡蠣茯神半夏薄桂歸身白芍黃耆鹽水炒案倦怠欲臥足軟無力元氣大虛也虛則納穀少而精神愈衰矣又兼咳嗽咽乾眼眵燥澀是有內熱難投溫補宜戒酒節勞為妙生地苡仁扁豆麥冬沙參蓮肉石斛橘紅南棗嗽止加參鬚案脈數無神最非佳兆體倦食減固由於元虛脾憊補之猶恨其晚無奈陰枯液涸有壯火食氣之患耳姑與調停法重補輕投可也熟地女貞子石斛參鬚丹皮苡仁扁豆麥冬案手戰不可持物舌痿不便語言飲食大減脈細無力此大虛之症右手痹痛右足無力有風痱之象脈細宜補黃耆歸身遠志肉棗仁制首烏秦艽生地枸杞桑皮案夢泄之後咽中窒礙兩足無力此腎脈不上循於喉嚨內奪而厥雖未喑已成痱矣納減作脹後天又衰脈帶數真陰難復非藥所能奏效也生地天冬牡蠣石斛杜仲苡仁女偵子湘蓮北沙參用井水煎五更服九如狂俞案案脈象左手寸尺細軟關部獨弦右手三部洪滑關部尤甚此平素心腎兩虛近則陽明痰火未清也腎主水水衰不能滋養肝木以致肝陽易亢怒火易升而心君位司離火又須坎水交濟水不足以制火故向有背僂起及脅痛吐瘀等病更兼操勞家政煩勞太過五志厥陽之火上擾則五液為其煅煉而成痰火與涎互相擊搏值今暑令忽發如狂之症此與本病不同所謂本虛而表實也近已深秋金水用事則陽火漸降病乃向愈然餘波未平故肝胃脈偏強現症口渴便堅溺赤心煩夜夢紛紜肺俞中脊脹悶均系痰火聚於肝胃之間法當先清後補標症既平方可滋養心腎以為調理之計鉤鉤熟石膏枳實膽星法半夏黃芩橘紅甘草蔞皮接方背上筋脈牽急以冷洗手自覺冷徹於背即飲食入胃亦著背而下此皆積痰變幻今脈象漸和惟右關獨大仍宜清陽明鉤鉤白芥子炒研海浮石秦艽苡仁桑寄生三錢石斛膽星絡石三錢十神昏俞案神昏如牽掣如痙脈細而弦徑是水不涵木肝木動搖非比實症易治元生地丹皮歸身淮山藥雲苓澤瀉鉤鉤元參加青鉛八兩熔化入水七次取水煎藥案形質瘦弱血虛內熱之軀又兼神識昏蒙如癲狀兩病分歧清補不能並用難治之候也元生地丹皮陳膽星橘紅元參甘草麥冬熟石膏案寒熱如瘧之後忽然神識遲鈍兼有盜汗脈象左細右弦滑此血虛而夾痰為病元生地膽星歸身丹皮寒水石三錢柏子仁遠志枳實甘草沖竹瀝五匕案病後目黃腳麻神識呆鈍而飲食如常肌肉不瘦此濕熱生痰為患脈象滑大清理可愈膽星半夏川連黑梔石菖蒲枳殼萊蔔子白芥子薑皮又左脈仍數大右脈略小亦數用清火消痰不應由水虧無制火耳議養陰兼滲濕元生地茯神丹參苡仁棗仁遠志肉苓皮柏子仁淮牛膝建蓮加燈心十一瘧俞案沈案案間日瘧原非重病但瘧發之前口渴瘧發之後渴退是邪伏於內以漸外達其勢不能遽止惡寒汗冷脈沉弦數宜和營衛以達邪桂枝白芍柴胡淡芩花粉炙草豬苓漂滑石加大棗老薑皮案瘧以禁止邪從內傳遂發不退面目黃色飲食不進脈象虛數此溫熱為風陽煽動法宜清理伏邪前胡秦艽大杏仁茵陳蔞皮木通黑梔淡豆豉甘草加薑皮案瘧來間日發不移時邪留募原不能與衛氣偕出也脈象弦遲寒多熱少宜桂苓甘術湯加清散藥桂苓甘術湯加木通青蒿丹皮大棗薑皮案瘧頻發謂之瘧邪留血分也左脈弦大右脈細軟和血以托邪則愈逍遙散加丹皮杜仲諸藥皆半生半炒以天泉井水各半煎案但寒不熱謂之牝瘧寒乍起脹而不食寒再起脹反稍寬右關尺弦細是脾寒濕也用桂枝附子湯桂枝附子七分生白芍茯苓二錢甘草大棗薑皮案但熱不寒脅痞盜汗脈而弦法宜和營歸身白芍生鱉甲苡仁丹皮根生地制於術香附浮小麥案瘧中病衄血去多而元氣虛法當補氣以生血參鬚丹皮茯苓麥冬白芍牡蠣生地山藥案瘧病頻作身痛脈細小勞即諸病皆來虛故也黃耆於術甘草生地歸身牛膝杜仲案脈系側關界限難明但細數無力虛象顯然矣三陰瘧久因勞而連綿身熱兼咳嗽喉痛肺脾兩傷勢必發腫以避風靜養為主淡豆豉炒熟秦艽薄荷丹皮大杏仁甘草橘紅馬勃加燈心三分接方川石斛麥冬苡仁茯苓皮桑白皮橘紅秦艽阿膠加薑皮案久瘧延成勞怯咽痛乾咳咳甚則噁心欲嘔此即勞瘧之基矣脈細右寸關沉滑是上年暑氣伏於募原漸傳肺胃二經耳宜清理勿驟滋補嫩蘆根六一散麥冬法半夏白豆蔻地骨皮杏仁加薑皮接方服清理藥咳嗽咽痛不減每交午後咽中如有物升即燥癢欲嗆此由腎脈絡肺腎家水虧火旺故循脈上衝乃損症機關即心嘈亦屬火爍胃陰自宜固本為主元生地麥冬川石斛北沙參丹皮天冬冬桑葉橘紅枇杷葉案三瘧久而寒熱日作此營衛兩傷乃虛候非變輕也面浮色淡全不納穀為脾敗之象咽痛脈數帶弦則難投補劑病勢殊深矣年猶未冠尚屬純陽之體姑與清養法以望轉關根生地丹皮麥冬苡仁青蒿洋參豬苓銀柴胡炙草大棗接方重病服藥漸得輕減已屬大幸乃遷延多日藥餌久停病勢日深谷納全廢面色白無神手足痿軟無力猶帶寒熱咽喉頻痛此陰枯氣索清補兩難之候危矣地骨皮經霜桑葉麥冬元生地洋參北沙參丹皮橘紅豬苓又寒熱仍歸三瘧此亦好處左脈弦大咽喉尚痛宜滋肝補腎元生地鱉甲麥冬丹皮北沙參地骨皮山藥苡仁豬苓大棗又去地骨皮山藥豬苓大棗加入牛膝青蒿參鬚案三瘧雖輕兩次發脈象細軟無神乃大虛之候參耆術草地芍芎歸附子五分大棗案瘧疾四作頓然形瘦腹脹脈象細弦是土敗木賊也歸身白芍柴胡大腹絨橘紅丹皮苡仁赤茯苓案瘧後心中衝悸脈象左大右小此元氣陰不足陰為火擾宜補中寓清參鬚元生地茯神小草丹參柏子仁紫石英棗仁加辰砂三分以紅絹包懸藥中煎案三陰瘧久止才一日發恰兩日此營衛俱傷正氣不能主持也汗多脈軟治宜補養兼之素有夢泄下焦虧損雖補不能速效四君加耆黃歸味棗以下沈案案揚州黃府癸丑五月初七日診太翁向來陽虛體質今癸丑歲濕土司天寒水在泉交芒種三之氣脾胃主候遂發瘧初起寒勝繼而熱勝夫脾應乎營胃應乎衛二氣遍造邪正相乘遂為寒熱診脈右大少神食納不甚舒暢略有噯噫如厄之象汗出肢冷溺頻便溏全是陽微少振擬溫理脾胃之陽為主不必多歧縷治人參生於術熟淡附子公丁香皮柴厚朴草蔻仁初八日詢初有寒熱在晡時今漸漸早發在辰卯兼神識欲迷口渴欲飲寒輕熱重熱時衣被皆去昨方因平素陽虛故用溫補之劑扶正托邪兼用辛溫理脾以宣暢營衛二氣使其氣機流行庶外邪可卻服後更加熱渴小便微黃想寒熱留戀旬日津液被劫況初病心悸虛症早已彰著用仲景炙甘草湯為邪少虛多治法人參麥冬炙草生地桂枝生薑阿膠大棗去麻仁初九日凡瘧邪由四末以擾中胃最受戕而胃為陽土其用乃陰瘧熱乘中胃津被耗理必煩渴噯噫氣逆上衝皆劫津所致脈數舌赤己見一斑高年溫補陽氣固本何疑今以客邪未除氣從熱化只因體質陽微不敢沉降清邪姑與生津養胃仿古酸甘化陰一法照前方去薑桂加烏梅肉初十日寒熱減半舌心微黃渴飲噯氣診兩手脈來虛數是胃中不和津被熱燥議用金匱麥門冬方養胃汁以供肺兼治痰氣蒙神人參半夏麥冬甘草去米棗加十一日寒熱未來診脈濡緩帶澀與昨診數虛互異此寒熱稍退之象第夜來寐不安逸脘中痞悶穀食無味便瀉兩次滑不自主凡五竅不和都屬胃病寒熱從四末以交會中宮胃當其衝受困可知夏至大節脈症漸平未必非調理中竅所致今日議進溫膽法以胃屬府喜通故耳陳皮茯苓竹茹半夏枳實去甘草加人參金石斛穀芽十二日前晚寐寤不安胸脘痞悶噯噫因思寒熱邪乘脾胃陽氣健運失司議用溫膽湯理痰氣以和中服後脹減寐和診時正寒熱初來脈形小弱是陽為邪郁寒退自當復耳再思中下皆虛虛則邪陷難解議以分治之法午余服延年茯苓飲理痰運陽培扶脾胃天明進露薑飲壯氣攻邪三服可以止瘧至於小便不爽高年虛人常有之證勿用滲利再伐下焦昨云九竅不和是都屬胃病也茯苓飲人參去白朮枳實生薑茯苓陳皮加澤瀉薑露飲薑四兩連皮搗汁露一宿空心服十三日兩日議進通補一理脾胃一益氣攻邪已有小效診脈右虛軟左微弦而澀歇亦少減仍以茯苓飲方照前方去澤瀉十四日連日進通補卻邪方法診脈驗症頗安但病傷可復而平素操持縈思積勞致損必須潛靜曠達方得生陽充沛諺云心病還須心藥醫也若仍煩勞不節斯心氣愈傷脾營更耗必至病端蜂起至若調攝藥餌全以後天脾胃為主勿費多歧紛縷可也外臺茯苓飲加南棗煨薑十五日夜寐頗安惟脘中不舒按之不痛此屬虛痞數為寒熱侮中清陽少於旋轉用治中法以運陽最穩人參生益智陳皮炒半夏茯苓炒菟絲餅炒遠志十六日服十五日方加神麯生穀芽去菟絲遠志十七日昨方減辛通佐和中意服後脘悶痞脹可見陽微濁凝必用通劑陽通斯濁不上潛今議進枳實附子理中湯通陽泄濁仍有補中之功能人參熟附子枳實陳皮生薑汁茯苓厚朴十八日穀芽神麯和緩服之脘脹易以枳實辛泄薑附溫通而效今以理胃陽為主東垣為胃降乃順脾升則健不可不分晰也照前方去枳實十九日茯苓飲加乾荷葉二十日茯苓飲加熟附子案李四二日久陽氣不主伸越致邪氣留升舉清陽亦可內托從汗而解服之已經東垣云夏瘧痢都因脾弱腥濁閉氣易阻當禁忌過月不使復病歸身廣皮制首烏杜仲白朮枸杞炙甘草案面黃苔白脘中格拒湯水都嘔三日瘧一至據色脈症乃足太陽陰微飲結當以溫藥和之丁香柄草豆蔻厚朴製半夏蓽撥薑汁案某三三瘧止勞復旦發熱勝心煩口渴汗多不飢邪在陽經知母草果黃芩烏梅生薑案陳初因寒濕久變為熱格拒於中為痞瘧固在陰當與邪陷痞氣同法用瀉心湯黃芩川連半夏厚朴乾薑草豆蔻枳實薑汁案李瘧邪能食不運足太陰陽氣受傷湯藥不效乃腸中之氣呆滯湯則流散氣輕小溫中由中走下兼可解鬱除濕氣得行運脹滿自減以脹乃腑病故也案蔣十此飲食失和脾胃內傷更加暑濕客邪傷氣幼稚純陽疸熱無寒之瘧面痿黃唇舌白腹脹便溏見症仍在足太陰脾延持太久有瘕聚疳疾之纍人參草果澤瀉厚朴廣皮茯苓豬苓生薑案顧二十二瘧熱傷陰五液少聚氣泄則陽化內風震動四肢麻痹巔眩心悸欲厥之象都屬厥陰食減不甘從胃和補制首烏天冬沙參茯神知母麻仁案顧四二夏秋暑濕成熱誤傷寒發散胃汁被劫腹不知飢肌腠皆乾燥甲錯甘寒生津為穩麥冬生地知母生甘草竹葉蔗汁案錢五十少陰瘧兩月胃關衰不納穀神消形瘦攻補不應宜舉八脈之陽陽壯邪可托出鹿茸當歸枸杞肉蓯蓉大茴香茯苓案某從前食物失調脾胃受虧即與幼稚之疳症病同物滯久延必傷正氣東垣所稱物滯既傷氣理必消補兼進人參厚朴陳神麯桔梗麻仁廣皮調磨積丹五分案錢三瘧日久奇經損極邪乘攻絡血從便出病為伏邪而參苓乃理胃之品非錮邪之品救逆湯仲景治火劫驚狂陽亡外越之症其意重鎮之中引以飛走由表由經脈以固束余曾用之以治陰瘧至柴葛泄陽尤非八脈方也人參當歸枸杞鹿角膠茯苓柏子仁鹿角霜桂酒拌白芍案朱四三陽微外寒陰弱內熱是為勞瘧宗東垣內傷議治薑棗補中益氣湯案周草三寒熱瘧邪都從四末擾中胃陽受侮食下脹悶大便不利是胃病據説脅下有形必系瘧母邪與氣血相混久病入絡當與通每日用仲景鱉甲煎丸早夜各服十五粒案朱久瘧溺淋五更熱止無汗治在肝胃丹皮知母鱉甲柴胡黑山梔雲苓木通阿膠案朱四三勞倦陽氣先傷營衛皆損瘧無止期自述天暖可緩陰晦病加身中陽微已著與壯脈護陽生鹿角白朮人參桂枝黃耆當歸炙甘草煨薑南棗案楊草八邪伏於陰而成三瘧表散不應脈緩中焦痞悶治在太陰草果厚朴桂枝白朮茅蒼朮薑汁案羅三三瘧日發既而間日寒多無汗食進不運診脈緩濡此陽微邪陷於陰寒起四末從太陰治露薑飲案成暑濕阻氣瘧止不飢氣傷不可流行是脾胃病生白朮廣皮黃芩半夏枳實草果仁案某瘧乃暑熱之後侵必傷胃陰先以甘寒生津不至再涉時邪竹葉心知母蜜炙麥冬生甘草蔗漿案趙久瘧傷陰夏熱發泄咳痰有血清心熱養胃陰淡薄飲食半月再議竹葉心鮮生地扁豆知母生草茯苓案某陰瘧經年寒熱必喘逆痰升左脈已結瘧母病在厥陰少陰邪混氣血為難治川桂枝生牡蠣熟附子茯苓炒常山案楊三三陽虛有時飲感令暑濕與痰飲氣結混蒸濕甚生熱汗多不解舌白嘔逆實非風寒飲亦濕類濕熱下注便溏不爽三焦不通瘧不能已不宜重劑推蕩以肥人陽易虛故也半夏淡黃芩草果滑石厚朴知母薑汁石菖蒲汁復診熱多消渴舌色淡黃目色已白水入嘔酸脘悶痰飲熱邪居中也大凡瘧邪寒熱必先從四末以乘中斯則中焦受困故瘧止之後旬朝不饒飢飽頗多非奇美也半夏醋炒生石膏生茅朮杏仁厚朴知母臨服加豆蔻末三分案周三七邪在陽為三瘧再為煩勞傷陽寒起足趾甚則肢節若墮冷飲不適陽傷大著身痛轉甚議用溫經一法桂枝湯加白朮附子案詹三十二瘧愈脘下脹悶既而失血盈碗是營血既受傷據云服地黃病劇非滯膩沉陰之藥可調議以轉運脾陽茯苓甘草桂枝南棗蜜煮熱老薑復診桂芩術甘湯復診香砂六君子湯案周二十八陰氣先傷陽氣獨發但熱無寒是為疸瘧舌乾渴飲嗽咳暑邪尚在肺胃知飢不嗜食乃邪熱不殺穀也先用玉女煎存陰清暑以和肺胃玉女煎去牛膝加竹葉心案毛陰瘧復腹大跗腫用養陰清補而愈長夏暑濕外加飢飽內傷皆是脾胃受病瀉利黏積雖罷而腹膨浮腫又來舌絳唇焦溺赤不是純虛見症茯苓茵陳滑石木通大腹皮厚朴案張三瘧屢止屢發時見右臂肩背胸脅腫凸旬日自散絡脈不和必安間靜養可愈藥未能速效案吳三三凡瘧久邪結必成瘧母瘕其邪深客於陰絡道路深遠肌膚無汗能食便溺通調病不在府從腹下升逆貫及兩膝腰中推及八脈中病理固有之然立方無捉摸議仲景轉旋下焦痹阻例以通陽苓薑朮桂湯案胡二三六腑以通為補只因久病外邪瘧痢之郁初用升陽繼以溫通仿古先表后里之義已經獲效必謹慎物食俾脾陽充復可以全愈淡附子人參大黃乾薑厚朴茯苓神麯漿丸案葉五六瘧漸延三日而發其邪已深入臟陰之絡四肢先寒太陰見症陰中伏邪非發汗和解可效惟按經內托扶正以獲安特不能速效耳腥濁閉氣皆為敵樹幟勿食為妥人參白朮桂枝炙草草果生薑南棗案居草八脈右沉濡左弦瘧經兩月止而復來食入便出腹中隱痛宜謹慎食物正餒邪陷有三陰延綿之慮鱉甲煎丸案王舌白不大渴寒戰後熱神躁欲昏而心胸滿悶更甚瘧系客邪先由四末以擾中宮嗽痰嘔逆顯是邪干肺胃體虛邪聚閉塞不通故神昏煩躁鬱蒸汗泄得以暫解營衛之邪未清寒熱蔓延無已此和補未必中竅按經設治為宜白豆蔻黃芩炒半夏杏仁淡竹葉薑汁復診寒熱嘔逆心胸痞悶夫心胸非停食之地可以攻消不過因瘧邪交會穢濁矇蔽使然故瘧過即安苟非芳香何能開其矇蔽舍此並無捷徑牛黃丸二服案李自病十三日夜不得寐肢臂有斑寒起四末熱鬱中焦渴不能飲胸脅痞脹按之則痛舌現灰白滯色二便皆不爽利此邪伏在絡寒熱後永不得汗古云瘧不離手少陽小柴胡投之不應其邪在絡何疑議通厥陰陽明桂枝木一錢茯苓三錢生牡蠣三錢淡乾薑一錢薑汁四分半夏錢半炒復診紫斑且多邪伏於營脘膈仍不爽用至寶丹每用三分金銀花湯化服案葉四一診脈右小弱左空弦視形色枯稿不華舌白不渴飲病及一月寒熱乾嘔神氣欲昏微厄煩不欲寐汗出此伏邪久而傷正陽氣日漓邪陷入陰胃虛客犯當邪乘攻觸見此昏煩嘔厄議溫胃陽益虛鎮肝逆逆理嘔煩用旋覆花代赭石湯旋覆花代赭石人參半夏廣皮煨薑南棗復診交子時乃戌亥純陰之餘氣陽氣不復形寒鼓栗巳午盛陽司時乃安況陽從汗出舌白為胃陽虛用附子湯法案張四三三瘧背寒骨束並無汗戰嘔逆治在少陽督脈鹿角霜枸杞歸身沙苑淡蓯蓉大茴案金二十太陰脾土性畏寒濕暑濕既在深陰瘧三日一至飲酒再助其濕瘧痢兼作但肛墜而腸胃不痛脈來濡弱當理濕以生陽用桂苓甘露飲案金間日瘧發頭痛脘悶痰多勞倦挾外感表劑宜輕半夏黃芩桔梗枳實青蒿蘇梗生薑案沈三三嗔怒復瘧一月腹膨脹滿二便仍通形寒汗多火升此肝木內震脾胃被戕氣衰為滯非陰藥可效金匱首章理脾胃必先制肝木仿此為例人參炙草椒目延胡茯苓益母厚朴川楝子案某素有勞怯外感瘧邪更傷脂液陰不上承上燥失音當與肺痿同治彼麻黃桑皮散邪泄肺於病於體皆悖雞子白生甘草葳蕤麥冬白元米湯煎案瞿失血數載經脈久空疸寒無熱為牝瘧每發於陽氣不足之人柿味甘寒蟹味鹹寒陽失行宣是皆左券宜乎日加寒懍而血絡並逆矣救逆湯案汪二八越三日必寒熱腹痛不飢途中吸入寒熱不正之氣消散與參朮皆非蘇合香丸案姚十八脈弱小促瘧不肯止皆辛散過投衛傷則寒營傷則熱用補中益氣湯數日可愈十二暑濕沈案案顧三四陽虛之體迫受暑濕氣分窒塞脈濡舌白頭脹心悸口渴治以桂苓甘露飲案錢四六當年久瀉用三神丸得效是脾腎兩固兼理氣分之滯體質陽虛遇冷病加今病延長夏小水不通必因夏濕阻其宣化久則氣血凝著而為腸紅姑與桂芩甘露令消其退案祈五二脈緩濡夏季過飢吸受暑濕膜原濁痹清氣不宣脘脹腹滿陰囊足跗皆腫得泄氣少舒濕與熱傳至經腑當分消其氣分大腹皮厚朴木通防己萊蔔子金沙茯苓皮萆薢案殷濕熱未盡氣分受傷形軟不舒即是熱傷元氣葳蕤緑豆皮炒川貝地骨皮知母生草案某四六濕溫長夏最多濕蒸熱鬱之氣由口鼻而入上焦先病漸布中下河間所謂三焦病也治法與風寒食積迥別仲景云濕家不可發汗汗之則病濕本陰邪中人也則傷陽汗之則陽愈泄越而邪留不解濕因熱鬱發現為黃熏蒸氣隧之間正如醃之比斯時病全在氣分連翹赤小豆湯可以奏績今經一月邪彌三焦自耳前後左腫及右癰瘍大發蓋癰者壅也不惟氣滯血亦阻塞蒸而為膿穀食不思陡然肉消殆盡胃氣索然矣商治於今補則治壅清則垂脫前輩成法一無可遵因思濕熱穢濁結於頭面清竅議輕可去實之法選芳香氣味使胃無所苦或者壅遏得宣少進漿粥便有進步按經云從上病者治其上靈樞云上焦如霧非輕揚芳香之氣何以開上青菊葉馬兜鈴連翹射干銀花川貝緑豆皮荷葉邊以清水拌濕鋪入甑中蒸露杯許和入金汁一杯常以茶挑服案時刮痧震動經脈體虛不耐頗覺不安亦無妨害但暑濕皆傷氣分氣無形質流行則邪解今以六味填陰滯濁暑氣恐無此方法竹葉心天花粉銀花連翹川貝鬱金案錢十六脈左小堅徑色蒼形腫當午熱灼口渴晨必微寒食物皆減此暑邪乘虛致病狀如瘧症因吐血屢發表散非宜姑以玉女煎方得熱止再議案錢四七宿病勞傷新感暑熱咽痛舌糜目黃宜清上分消連翹麥冬竹葉心川貝馬兜鈴六一散案俞四六脈小舌白小溲淋閉大便不爽仍流此暑濕著於氣分氣阻竅窒當治其上以水出高源也滑石通草桑皮茯苓皮米仁蘆根案沈四七陽虛不喜涼食氣阻膈間脈沉目黃必有冷濕之氣內著用辛溫補通之半夏茯苓厚朴益智仁廣皮白案金十九暑邪內伏暑必兼濕傷於氣分漸布三焦三焦變瘧不成邪歸傷陰痢不盡邪又變微熱不食不飢九竅不和嘗聞病起在氣病久入血延綿經月再治肺邪愚老人見不及此牡蠣川連川柏秦皮遠志人中白案鄭暑必挾濕二邪皆中傷氣分阻而無質首從治肺極是以邪由吸入自上而中也夫肺主衛心主營衛營失和為寒熱肺邪逆行犯及心包遂熱熾神躁昏譫汗出不解邪非表受即大便通利而痞悶仍然亦非胃家實熱可攻而愈由無形氣結日郁郁久必熱久蒸痰聚而為不飢不食之症矣案某風寒必從六經暑熱必究三焦況乎上受之邪當治其上開其上結取氣微辛取味微苦體質素虛勿用重劑傷損陰陽復診昨方辛勝於苦取乎開多降少恰在胃脘之上方中草果知母兩和脾胃以止瘧服已胸脘有辛辣氣味今午診左數右寸尺大胸次按之微痛舌上白膩亦不渴飲決非實熱滯結思表散過辛必泄肺肺餒不司肅降上氣遂致凝結內經以氣過於辛有食甘以緩之之義然甘味皆守氣鈍非為合法況秋分得天氣之降今金氣無權未能應乎天氣擬商繆仲醇方法平衡輕劑仍從上治十三厥俞案沈案俞案案無端眩暈僕厥移時方醒今面目黃色口乾溺赤脈象左細右滑此心腎虛弱外受暑濕之邪暑為火濕生痰故病形如類中法宜與清理繼以補養乃不復發半夏赤苓香薷厚朴川連酒炒四分茵陳鉤鉤木通鮮藿香葉一錢案病後發厥神昏口噤痰響涎流此五之類脈細無力乃虛也補之則愈黃耆制於術黨參茯神棗仁遠志歸身炙草桂元大棗案頭重如欲暈倒冷汗大出手足厥逆脈細右手尤覺微渺舌苔白起病不過八九天小便不利正值夏月辛苦作勞之時作暑厥治先服地漿水洋參麥冬北五味半夏醋炒絲瓜葉環栗丹皮沈案案吳三九厥陰氣衝昏厥都因陽明脈虛通泄和陽不能卻病議填胃土以熄虛風生牡蠣生黃耆炒常山甘草南棗案朱三七俯則氣塞咽喉呼吸不通暈厥面色油亮神色昏蒙足痿無力蓋肝腎下虛濁陰下潛仿仲景腎氣厥用濁藥輕投一法地黃飲子案某陽虛之體頻遭病傷能食不充旺耳鳴心悸內風漸至有中厥之虞右歸補陽亦可但桂辛甘損耗肝血當易以溫柔固攝冀免虛風薑製地黃人參當歸茯苓肉蓯蓉五味枸杞山藥淡附子萸肉棗肉和丸案朱三七腎虛氣厥用河間地黃飲子頗安據説過勞病加必有肝陽陡升莫制咽乾舌燥少寐當復以息風和陽之品磁石遠志茯苓熟地肉蓯蓉柏子仁枸杞五味天冬牛膝案程女草九前方解經氣鬱熱兼流行氣血奈經水數月不至厥發兩次因驚動氣喉間血腥失音而心口隱痛巔脹鼻痛總由厥陽上冒清空所致與蘆薈丸服二錢案吳幼有癇厥必挾痰火愈經數年年壯而復發是情動陰泄陽遂得以上冒自言左脅中氣衝上引必心胸痞塞此肝臟厥陽無制由乎水弱不為木耳六味丸去山萸加磁石龜板白芍案某諸動屬陽勞煩則擾於氣肝司藏血拂鬱則血菀於脘午後氣並於血升降清濁為厥脈來浮數而細澀面黃唇白熱勢少輕神昏如故胸腹隱痛必非停滯診有瘀聚所致目荒舌縮為腎水竭絶之徵瘛瘲不止乃肝虛風動之象病名暴厥養葵所謂薄厥煎厥之類開心包不應勉蒲黃散去瘀舒郁續進滋養天一之水以冀風糜火熄此屬不得已之想未識以為何如十四癇俞案案癲之症脈大易愈脈細難痊今脈細而目睛無神交夜糊塗口渴是病在重陰不能去根矣陳膽星元生地丹皮小川連酒炒海浮石甘草青黛五分漂淨沖服接方惱怒則肝火熾盛又加驚恐則肝膽俱病木火交亢以致癲妄神昏今雖稍輕而脈左弦右滑是火鬱生痰之故故筋惕而脹亦屬肝火煽風法以抑肝清痰為主陳膽星鉤鉤法半夏川連酒炒枳實橘紅甘草海浮石竹瀝十匕薑汁一匕案風乃難愈之候脈數帶滑宜先清其痰元生地炒四兩炒歸身二兩丹皮炒一兩五錢羚羊角磨汁加入五錢青黛漂淨三錢川連酒炒三錢陳膽星薑汁炒一兩半夏一兩五錢橘紅炒一兩五錢用神麯二兩打漿加入羚羊汁和藥為丸每晨服二錢又勢稍輕未能脫體左弦脈尚存宜佐以聖惠三丸石礬八兩一半生用一半煅枯荊芥穗炒四兩為末用粳米粥湯糊丸以漂辰砂為衣每服二錢案足麻至心即神昏痙搐喉有痰聲此症也脈細而沉弦宜歸脾湯黃耆黨參術遠志肉炙歸身鹿角膠半夏丸方耆術黨參遠志歸仲熟地鹿角膠二兩河車坎案肝風內舞痰因火升左邊頭頂手足肩腹俱有牽絆之象蓋厥陰經脈所過地部皆為痰火纏擾也痰火不清症必然復發清心戒怒靜養可痊陳膽星海浮石橘紅鉤鉤川斛羚羊角尖枳實甘草又方逍遙散加減又方虎潛丸加減十五短氣俞案案舒氣稍長胸脘即痛仲景所為短氣不足以息者實也此實字指痰飲逆氣而言也尊恙恰合是條右脈細弱法當溫通雲苓法半夏茅山術乾薑巴戟新會皮補骨脂甘草胡桃膈十六郁俞案案內經以喜怒出於膻中今襟懷不暢無欣欣自得之意蓋緣久鬱則清陽失司生機不能靈動也遇事煩厭難耐寐醒即欲起身肝陽心火易擾而不寧謐擬由滋養以濡濟之所謂盞中添油爐中覆火之法也茯神遠志棗仁歸身丹參柏子仁半夏曲石菖蒲麥冬萱草人參神麯和丸金箔為衣案少年即有鬱症生陽不能舒布也加之驚則肝膽亦病自然寐少寤多蓋陽不入於陰血不協於氣也今屆六旬之外血更衰痰漸生胸膈右邊不能融暢便燥臂痛著衣不便鼻亦不知香臭此由氣餒則痰滯升降出入之機針廢弛恐為厥中根基診脈左小右宜補心脾化痰利氣使營衛流通乃無大患茯神霞天曲柏子仁丹參遠志棗仁川桂枝歸身甘草薑皮又臂痛止去桂枝加參後服指迷茯苓丸案懷抱不舒氣鬱於中焦五更將交寅卯時為木旺之候故肝陽上衝喝喝如太息間有腐臭者鬱則成火也脈弦帶數宜清理肝肺麥門冬湯麥冬洋參半夏冬瓜子知母橘紅鉤鉤鬱金汁案心熱汗出即不得寐舌苔黃厚又不作渴脈細左弦是心肝鬱火症病始齒痛理宜壯水根生地木通竹葉丹皮元參川斛麥冬女貞子旱蓮草案腹鳴而氣上衝心此厥陰症也脈右沉左弦沉則氣滯弦則木鬱鬱則少陽生氣不伸怵惕憂慮自不能禁病由肝而及心腎宜開宜鎮為治抱木茯神七孔石決明磨去黑皮研三錢遠志肉五花龍齒骨錢半石菖蒲棗仁柏子仁二錢加辰砂三分紅絹包懸於藥中煎案憂悲則氣結不舒生陽衰颯故納穀作脹噯噫煩悶其足膝腫痛連兩拗及背皆痛者以至陰之地無陽以蒸動也虎膝骨茯神杜仲淡附子生於術淮牛膝生苡仁接方目有微赤暫定溫藥茯苓焦白朮杜仲白芍車前子小茴香金毛狗脊去毛切片三錢苡仁大棗又去小茴香用千年健三錢十七眩暈俞案沈案俞案案頭眩脈弦清晨嘔痰此肝陽上擾兼酒之濕熱生痰助火耳虎膝骨雲苓半夏甘菊川連杜仲刮橘紅赭石白蒺藜案頭眩心跳脈而軟黃耆於術黨參歸身茯神棗仁杜仲甘草麥冬薑棗案頭重眩足軟弱左脈細而弦是肝腎虛症虎膝骨歸身白芍元熟地枸杞淮牛膝鎖陽酒洗牡蠣杜仲案頭眩神昏厄逆痰因火動肝陽上擾之故九孔石決明磨去黑皮鹽水煮半日研末同煎三錢遠志肉茯神橘紅白福花江枳實鉤藤沈案案宋四十操持煩心身中陽氣多升肝膽相火內風震動莫制遂有眩暈驚惕肉酒蒸聚濕熱由胃脈下注跗足每多膿水此痿厥中風之萌秋冬務在藏聚溫養經脈佐以溫通加味虎潛丸宜用虎潛丸去白芍當歸知母鎖陽廣皮加枸杞茅蒼朮白蒺藜車前子紅棗丸案某陽氣內風升舉眩暈肢麻遺泄頗頻陰氣先已暗傷致二氣失交凡下虛必上實諸脈廢而不用中年以後痱中厥僕至矣診脈小緊數治在藏陰羊肉杞子首烏五味甘菊黑豆皮鉛罐煎案劉六三脈得動博勞心煩劇陽易升越內風陡起遂致眩暈欲僕據述上冬患此春夏數發蓋冬季少藏不耐天暖氣泄法當填陰收納以培風蟄二陳湯只治痰眩非攝納方也鹿角膠柏子仁天冬熟地杞子青鹽石菖蒲遠志蓯蓉茯神牛膝魚膠十八脾胃沈案案張脾胃不和鬱熱內起屬五疳之症川連藿香厚朴茯苓皮廣皮木通案吳五七脾陽衰微食入不運湯飲更易壅積脾惡濕也當薄味令清氣流行脈小澀非破氣所宜薑棗異功去甘草加厚朴益智案某經營不遂情懷拂鬱少火化為壯火風木挾陽上巔眩暈不寐是陽不入陰非虛症也如果純虛豈有自春及秋仍能納穀驅馳今倏然脘中阻噫由藥傷胃口致胃陽上逆使然議用溫膽湯溫膽湯去甘草加桑葉丹皮案葉二十和胃清熱漸次加餐第中士既傷陽木易動已覺火升畏熱倘食物調理失宜鬱熱內蒸精液消爍則難圖矣調中為主兼理少陽鬱熱白朮丹皮胡黃連陳皮枳實黑梔芍桑皮案蔣草九前方通三焦頗效想經年九竅不和屬胃病而犯胃最速莫若肝邪中焦氣鈍左升右降皆已失司郁痹不行少火化為壯火治宜清降辛宣淡黃芩白豆蔻川連厚朴杏仁案汪胃精不能上供由夏令勞煩泄氣致交秋新涼外束而痛兩進清涼僅去其邪而痛不愈者津未復也議益胃津生扁豆大沙參桑葉葳蕤生草白元米湯煎服案某凡寒熱瘧氣起於四肢蒸及中宮必滿悶煩冤氣痹治肺熱灼清胃皆是古法首方兼理上中轉方專理氣無非氣結宜開治法只因病延多日質薄胃弱於寒熱未止之時頻加厄逆經言胃氣以下行為順中乏穀氣坐鎮少權胃土屬陽譬如雨露上施陽土得濡潤而禾苗蕃盛今也日加熱蒸斯震動之氣上翔胃氣不安其位矣嘗讀仲景書吐狐惑噫氣噦厄諸篇必系胃虛少谷但須分在陰在陽之客為正非案中稍申甘緩益胃進以味輕氣清以消息病情蓋志慎也辰刻診候儀容清減脈右虛數法仲景病邪未盡正氣欲衰當與甘藥之旨胃氣應乎衛寤則行陽寐則行陰行陽主動行陰主靜由寒熱相爭乘胃藥湯劣味再入胃經旬未沾飲食甘美胃已坐困衛之行陽循陰機栝已偏厄逆之乘甚於寤而不寐者未得天地交泰之旨也古人治病必曰攻邪十之六七謂邪衰其大半而止正謂此今須少少進谷納食為安調寢食於醫藥之先再無貽害十九肝病俞案案氣上衝心心內熱疼仲景例之厥陰篇但暴病為邪熱內陷久病為水不涵木脈弦而細宜滋腎以生肝川楝生地丹皮白芍枸杞杜仲歸身加建蘭葉錢半案咽喉如有線牽引不便俯仰脈象左弦大此肝陽射肺也羚羊角川貝橘紅絲瓜子射干海粉紫菀杵頭粳案腎陰不足肝陽內擾筋跳強中多食易飢皆水虧木亢之故驚氣亦從肝入夢與人爭亦屬肝火以木侮土則腹中如脹氣閉不爽就脈象之左弦右細宜益木培木參鬚茯神遠志生地山藥柏子仁龍骨白芍南棗肉三錢淮麥炒三錢案先天真陰不足水虧則火易上炎加以肝陽升逆背心烘熱倏作倏止常時乾嘔痰帶微血此皆童弱之基脈象左手弦徑且與清肝勿據用滋膩藥寐中驚惕出汗亦屬肝病宜溫膽湯加減茯神半夏麥冬石決明冬瓜子小草白芍杜仲竹茹八分案顫振不止脈細帶弦肝風為害也虎脛骨牡蠣歸身白芍生地牛膝鉤鉤案靜坐安臥自覺身內振搖然非肌肉懦也側左則左搖側右則右搖譬諸地動由於風火激搏也面多赤瘰病在陽明而陽明以腎為關總宜助少陰之寒水以熄陽明之風火生地丹皮枸杞沙苑蒺藜冬桑葉歸身白芍虎脛骨制首烏女貞子甘菊霞天曲為末以川石斛煎膏絞去渣少加煉蜜為丸二十忡悸俞案案左寸關洪大心肝之火上燔也火動風生心包淡淡大動怵惕不寧法宜重以鎮之寒以折之生地丹參茯神遠志肉柏子仁棗仁龍齒麥冬辰砂半夏曲川連歸身神麯三兩打漿糊丸金箔為衣案驚悸恐怕心腎兩虛也自述火升背熱頭重帶搖此痰火上冒清陽之位恐延癲痼疾不可遽補且進清理為妥生地小川連鉤鉤青黛一錢連翹橘紅丹皮膽星甘草辰砂案嘈雜心悸見人則畏夜夢紛紛皆心神受病脈沉弦兼痰滯膽經也茯神法夏龍骨遠志柏子仁棗仁石菖蒲丹金器一件同煎案寐中驚跳肝有熱而魂不這發藏也從前目晴忽陷亦由肝竅在目肝繫了戾筋脈為之攣釣耳今病與昔病其因卻相同元生地龍骨火煅醋淬錢半茯神遠志柏子仁虎睛乳搽炙熟一個棗仁歸身加金箔三張攪勻服案憂愁悒鬱心神受傷腎不上交故應酬無意緒行動則氣促診脈左弦右細知非痰火為病宜歸脾湯寧志膏之類黨參黃耆元生地遠志肉茯神歸身棗仁炙草木香汁又脈細弦重按覺有力肝陽上亢暫進清肝法前用補不應症兼口燥左脅脹細生地羚羊角尖香附鉤鉤黑梔木通青黛橘紅金器一件又用清肝法又覺外寒此亦氣血久虛之故但左脈尚沉弦仍從肝治為妥元生地伏神膽星鉤鉤遠志肉橘紅丹皮羚羊角尖加辰砂二分沖服案神氣模糊夜不能寐心忡腰痛舌苔黃垢脈象左弦細右滑大此心腎兩虛痰涎沃膽之候宜先清後補陳膽星茯神遠志半夏丹參杜仲海浮石橘紅加薑皮又先服暫服方茯神法半夏熟石膏白福花枳實橘紅石菖蒲甘草又心忡稍緩心膈仍熱脊腰時痛夜寐未安脈之滑大雖減猶帶數象此水衰不能制火肝膽厥陽上冒宜去痰藥佐以潛降品虎膝骨牡蠣元生地茯神川石斛杜仲淮牛膝小葉沉香汁二分又經云腎開竅於二陰從二便不爽必努掙而出及脊腰下部作痛原有腎虧無以上交於心致忡悸恍惚夜不安臥自用潛陽方法頗有功驗但納穀難化腹脹肢浮此固中氣餒乏亦緣腎不納氣則氣填於上中二焦蓋腎為胃關也足膝麻冷其明徵矣所嫌左寸關浮滑大兼之精滑舌苔難投溫藥導陽耳虎膝骨牡蠣元生地茯神杜仲芡實川石斛湘蓮小葉沉香汁二十一不寐俞案沈案俞案案右寸脈弱左寸關弦滑此勞心太過心不攝腎而為夢泄又以思慮傷脾脾虛則生痰痰停心包故不寐嘈雜宜先半夏秫米湯繼以歸脾湯調理然後可以拋棄一切安神忌食靜養則漸可向安無慮矣熟半夏半杯白糯米小半合以千里長流水揚之萬遍取二碗煎藥煎用枯蘆葦代炭沈案案某按靈樞經云凡人陽氣暮必下交於陰陰蹻脈中氣滿陰氣包護陽氣不令透泄於外遂令熟寐反是寐不成寐者陽動於外神識焉得歸著於裡經義用半夏秫米湯藉半夏由陽氣入陰中更入蹻脈隨以秫米奠安脾胃之氣為中宮砥柱不令氣升陽浮然必多服方有效驗
