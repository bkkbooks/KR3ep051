front:
  text: 序醫貴學問尤重經驗諺有之曰熟讀王叔和不如臨診多正謂此也岐黃家出平時之心得證臨診之經驗筆之於書厥名醫案孫東宿葉天士諸先生皆有專書至古今名醫類案出乃集諸家之大成上下千年體無不具用無不周洋洋乎大觀哉有清俞東扶先生後有醫案按之刻蓋選取類案中之良者而每篇加以按語啓迪後人用心苦厥功尤偉矣俞先生為禾郡名醫生平治驗方按經及門筆録者多如束筍此據嘉興金君云此册乃金君祕笈向不示人以俞案自經兵燹毀損殆盡鳳毛麟角彌足珍貴也瑞荷金君不棄謬許知音攜以餉遺鄭重囑咐亟命金生福臣録副而歸之倉卒捉筆訛誤滋多內附沈案數則立案明晰制方輕靈與俞案一鼻孔出氣是皆得力於香岩葉氏者非聰明不克臻此瑞廁身醫界草年矣每遇疑難大證不惜苦心焦思以求挽救而往往有合得此書於臨診翻檢可資裨補金君之惠我多矣篝燈率記遑計工拙民國十年辛酉端陽節鳳初巢元瑞
